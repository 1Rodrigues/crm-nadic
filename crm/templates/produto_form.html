{% extends 'base.html' %}

{% block conteudo %}
    <h2>{% if object %}Editar Produto{% else %}Novo Produto{% endif %}</h2>
    <hr>

    <div class="card p-4">
        <form method="POST">
            {% csrf_token %} {{ form.as_p }}

            <button type="submit" class="btn btn-success">Salvar</button>
            <a href="{% url 'produto-list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
{% endblock %}
